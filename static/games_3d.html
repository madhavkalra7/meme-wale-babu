<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meme Wale Babu | 3D Games</title>
  <meta name="description" content="Meme Wale Babu 3D games hub. Browse games and open them directly on Friv4School." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/games_3d.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar">
    <a class="brand" href="/">
      <span>Meme</span>
      <span>Wale</span>
      <span>Babu</span>
    </a>
    <nav class="actions">
      <a class="btn ghost" href="/">Home</a>
      <a class="btn ghost" href="/games">2D Games</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero">
      <p class="eyebrow">External Games Directory</p>
      <h1>All 3D Games In One Place</h1>
      <p class="sub">
        Har game card pe click karte hi Friv4School page open hoga. Broken thumbnail ka auto-fallback bhi laga hua hai.
      </p>
      <div class="toolbar">
        <input id="game-search" type="search" placeholder="Search game name..." aria-label="Search game" />
        <span id="game-count" class="count"></span>
      </div>
    </section>

    <section id="games-grid" class="grid" aria-live="polite"></section>
  </main>

  <script src="/static/games_3d_data.js"></script>
  <script src="/static/games_3d.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Profile</h1>
        <form action="/profile" method="POST" onsubmit="return validatePasswordForm()">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" required><br><br>

            <hr>

            <h2>Change Password</h2>
            <label for="current-password">Current Password:</label>
            <input type="password" id="current-password" name="current-password" required><br><br>

            <label for="new-password">New Password:</label>
            <input type="password" id="new-password" name="new-password" required><br><br>

            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" name="confirm-password" required><br><br>

            <input type="submit" name="update_profile" value="Update Profile">
            <input type="submit" name="change_password" value="Change Password">
        </form>
    </div>

    <script>
        function validatePasswordForm() {
            var currentPassword = document.getElementById('current-password').value;
            var newPassword = document.getElementById('new-password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            if (currentPassword === '' || newPassword === '' || confirmPassword === '') {
                alert('Please fill in all fields.');
                return false;
            }

            if (newPassword !== confirmPassword) {
                alert('New password and confirm password must match.');
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
